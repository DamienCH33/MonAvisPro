name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    tests:
        name: Tests & Qualité
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_DB: monavispro_test
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP 8.4
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  extensions: pdo, pdo_pgsql, intl, ctype, iconv
                  coverage: none

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Generate JWT keys
              run: |
                  mkdir -p config/jwt
                  openssl genpkey -algorithm RSA \
                    -out config/jwt/private-test.pem \
                    -pkeyopt rsa_keygen_bits:4096 \
                    -pass pass:ci_passphrase
                  openssl rsa \
                    -pubout \
                    -in config/jwt/private-test.pem \
                    -out config/jwt/public-test.pem \
                    -passin pass:ci_passphrase

            - name: Setup database
              env:
                  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/monavispro_test?serverVersion=15&charset=utf8
              run: |
                  php bin/console doctrine:database:create --env=test --if-not-exists
                  php bin/console doctrine:migrations:migrate --env=test --no-interaction

            - name: Run PHPUnit
              env:
                  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/monavispro_test?serverVersion=15&charset=utf8
                  JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
                  JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
                  JWT_PASSPHRASE: ci_passphrase
                  GOOGLE_PLACES_API_KEY: fake_key_for_tests
                  OPENAI_API_KEY: fake_key_for_tests
                  MAILER_DSN: "null://null"
              run: php bin/phpunit --testdox

            - name: Run PHPStan
              env:
                  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/monavispro_test?serverVersion=15&charset=utf8
                  JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
                  JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
                  JWT_PASSPHRASE: ci_passphrase
              run: vendor/bin/phpstan analyse src --no-progress

            - name: Run PHP CS Fixer (check only)
              run: vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction
