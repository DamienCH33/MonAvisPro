[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo_pgsql",
  "php84Extensions.iconv",
  "php84Extensions.ctype"
]

[phases.install]
cmds = [
  "composer install --no-interaction --prefer-dist --optimize-autoloader"
]

[start]
cmd = "php bin/console doctrine:migrations:migrate --no-interaction && exec frankenphp run --config /app/Caddyfile"